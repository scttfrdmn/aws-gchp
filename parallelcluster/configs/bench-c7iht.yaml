# GCHP Benchmark — Intel c7i 192 vCPU (96 cores + SMT) — labeled NOT-physical
# C90, single node, 96 PHYSICAL cores (SMT disabled — fair HPC comparison).
# Uses the x86_64 validated stack (generic -O2, runs on Intel + AMD).
# This is the DE-RISK run: first time the x86 binary runs on Intel.

Region: us-east-1
Image:
  Os: alinux2023

HeadNode:
  InstanceType: c7i.2xlarge          # small Intel head node
  Networking:
    SubnetId: subnet-2eec4a71         # us-east-1a (input FSx AZ)
  Ssh:
    KeyName: aws-gchp
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonS3FullAccess

Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: compute
      ComputeResources:
        - Name: nodes
          InstanceType: c7i.48xlarge   # 96 physical cores (192 vCPU w/ SMT)
          MinCount: 0
          MaxCount: 1
      Networking:
        SubnetIds:
          - subnet-2eec4a71
        PlacementGroup:
          Enabled: true
      CapacityType: ONDEMAND

SharedStorage:
  - Name: software
    StorageType: FsxLustre
    MountDir: /fsx
    FsxLustreSettings:
      StorageCapacity: 1200
      DeploymentType: SCRATCH_2
      ImportPath: s3://gchp-shared-storage-us-east-1/stacks/x86_64/gchp14.7.1-validated/
      DataCompressionType: LZ4
  - Name: input
    StorageType: FsxLustre
    MountDir: /input
    FsxLustreSettings:
      FileSystemId: fs-0ab32d8b6872eab86   # gchp-input-data-v2 (GEOS-Chem RODA)

Tags:
  - Key: Project
    Value: GCHP-Benchmark
  - Key: Benchmark
    Value: c7i-intel-gen7-C90
  - Key: Architecture
    Value: x86_64-intel
