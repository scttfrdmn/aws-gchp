# GCHP Software Stack Builder Cluster
# Purpose: Build gcc12.3-ompi4.1.7-gchp14.7.1 stack
# Duration: ~3-4 hours for complete build
# Region: us-east-2
#
# Usage:
#   1. Create cluster: AWS_PROFILE=aws uv run pcluster create-cluster --cluster-name gchp-builder --cluster-configuration builder-cluster.yaml --region us-east-2
#   2. SSH in: ssh -i ~/.ssh/aws-benchmark.pem ec2-user@<ip>
#   3. Run build: bash /fsx/build-gchp-stack.sh
#   4. Sync to S3: aws s3 sync /fsx/stacks/gcc12.3-ompi4.1.7-gchp14.7.1/ s3://gchp-shared-storage-us-east-2/stacks/gcc12.3-ompi4.1.7-gchp14.7.1/
#   5. Delete cluster

Region: us-east-2
Image:
  Os: alinux2023

HeadNode:
  InstanceType: c7a.2xlarge  # 8 cores for build
  Networking:
    SubnetId: subnet-cbdcddb1  # us-east-2b
    ElasticIp: true
  Ssh:
    KeyName: aws-gchp
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonS3FullAccess  # Need write access for S3 sync

Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: builder
      ComputeResources:
        - Name: build-node
          InstanceType: c7a.2xlarge  # Build node
          MinCount: 0
          MaxCount: 1
      Networking:
        SubnetIds:
          - subnet-cbdcddb1
      CapacityType: SPOT  # Use spot for cost savings during builds

SharedStorage:
  # FSx workspace for building software stack
  - Name: workspace
    StorageType: FsxLustre
    MountDir: /fsx
    FsxLustreSettings:
      StorageCapacity: 1200
      DeploymentType: SCRATCH_2
      DataCompressionType: LZ4
      # S3 integration for persistence
      ImportPath: s3://gchp-shared-storage-us-east-2/
      ExportPath: s3://gchp-shared-storage-us-east-2/
      AutoImportPolicy: NEW_CHANGED

Tags:
  - Key: Project
    Value: GCHP-on-AWS
  - Key: Purpose
    Value: Software-Stack-Builder
  - Key: Stack
    Value: gcc12.3-ompi4.1.7-gchp14.7.1
  - Key: Owner
    Value: "scofri@amazon.com"
  - Key: TemporaryResource
    Value: "true"
  - Key: AutoDelete
    Value: After-Build-Complete
