# GCHP Benchmark Cluster Template
# 
# Purpose: User cluster for running GCHP benchmarks
# Software & input: Read-only from S3
# Scratch: Ephemeral (no S3 backing)

Region: us-east-1

Image:
  Os: alinux2023

HeadNode:
  InstanceType: t3.xlarge
  Networking:
    SubnetId: subnet-2eec4a71  # us-east-1a
  Ssh:
    KeyName: aws-gchp
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonS3FullAccess

Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: compute
      ComputeResources:
        - Name: hpc7a-nodes
          InstanceType: hpc7a.24xlarge
          MinCount: 0
          MaxCount: 8  # Up to 8 nodes for benchmarking
          Efa:
            Enabled: true
      Networking:
        SubnetIds:
          - subnet-2eec4a71
        PlacementGroup:
          Enabled: true
      CapacityType: ONDEMAND

SharedStorage:
  # 1. Software Stack (READ-ONLY)
  - Name: software
    StorageType: FsxLustre
    MountDir: /fsx
    FsxLustreSettings:
      StorageCapacity: 1200
      DeploymentType: SCRATCH_2
      ImportPath: s3://gchp-shared-storage-us-east-1/stacks/x86_64/gchp14.7.1-validated/
      # NO ExportPath - immutable, read-only software stack

  # 2. Input Data (READ-ONLY)
  - Name: input
    StorageType: FsxLustre
    MountDir: /input
    FsxLustreSettings:
      StorageCapacity: 1200
      DeploymentType: SCRATCH_2
      ImportPath: s3://gcgrid/  # GEOS-Chem RODA in us-east-1
      # NO ExportPath - immutable, read-only input data

  # 3. Scratch (EPHEMERAL - no S3 backing for benchmarking)
  - Name: scratch
    StorageType: FsxLustre
    MountDir: /scratch
    FsxLustreSettings:
      StorageCapacity: 2400
      DeploymentType: SCRATCH_2
      # NO ImportPath/ExportPath - pure ephemeral scratch
      # User manually copies important results to their own S3 before cluster delete

Tags:
  - Key: Project
    Value: GCHP-Benchmark
  - Key: Stack
    Value: gchp14.7.1-validated
  - Key: Architecture
    Value: x86_64

# Usage:
# 1. Load environment: source /fsx/gchp-env.sh
# 2. GCHP executable: /fsx/gchp-14.7.1/bin/gchp
# 3. Input data: /input/
# 4. Run directory: /scratch/my-run/
# 5. Before cluster delete: aws s3 sync /scratch/important-results/ s3://my-bucket/results/
#
# Stack: GCC 12.2.0 + OpenMPI 4.1.7 + ESMF 8.6.1 (validated) + GCHP 14.7.1
