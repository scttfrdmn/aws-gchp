# GCHP Graviton/ARM64 Benchmark Cluster
# Purpose: Benchmarking on ARM64 (hpc7g, c7g, c7gn, c8g)
# Stack: GCC 12.2.0 + OpenMPI 4.1.7 + ESMF 8.6.1 + GCHP 14.7.1 (ARM64)
# Architecture: aarch64

Region: us-east-1
Image:
  Os: alinux2023

HeadNode:
  InstanceType: c7g.2xlarge
  Networking:
    SubnetId: subnet-2eec4a71  # us-east-1a
  Ssh:
    KeyName: aws-gchp
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonS3FullAccess

Scheduling:
  Scheduler: slurm
  SlurmSettings:
    ScaledownIdletime: 10
  SlurmQueues:
    - Name: compute-hpc7g
      ComputeResources:
        - Name: hpc7g-16xlarge
          InstanceType: hpc7g.16xlarge
          MinCount: 0
          MaxCount: 20
          DisableSimultaneousMultithreading: true
          Efa:
            Enabled: true
            GdrSupport: false
      Networking:
        SubnetIds:
          - subnet-2eec4a71
        PlacementGroup:
          Enabled: true
      CapacityType: ONDEMAND

    - Name: compute-c7gn-16
      ComputeResources:
        - Name: c7gn-16xlarge
          InstanceType: c7gn.16xlarge
          MinCount: 0
          MaxCount: 10
          DisableSimultaneousMultithreading: true
          Efa:
            Enabled: true
      Networking:
        SubnetIds:
          - subnet-2eec4a71
        PlacementGroup:
          Enabled: true
      CapacityType: ONDEMAND

    - Name: compute-c7g-16
      ComputeResources:
        - Name: c7g-16xlarge
          InstanceType: c7g.16xlarge
          MinCount: 0
          MaxCount: 10
          DisableSimultaneousMultithreading: true
          Efa:
            Enabled: false  # c7g without 'n' has less network performance
      Networking:
        SubnetIds:
          - subnet-2eec4a71
        PlacementGroup:
          Enabled: true
      CapacityType: ONDEMAND

SharedStorage:
  # Software Stack (ARM64/aarch64)
  - Name: software
    StorageType: FsxLustre
    MountDir: /fsx
    FsxLustreSettings:
      StorageCapacity: 1200
      DeploymentType: SCRATCH_2
      ImportPath: s3://gchp-shared-storage-us-east-1/stacks/aarch64/gchp14.7.1-validated/
      DataCompressionType: LZ4

Tags:
  - Key: Project
    Value: GCHP-Benchmark
  - Key: Stack
    Value: gchp14.7.1-validated
  - Key: Architecture
    Value: aarch64
  - Key: InstanceFamily
    Value: hpc7g

# Usage:
# 1. Load environment: source /fsx/gchp-env.sh
# 2. GCHP executable: /fsx/gchp-14.7.1/bin/gchp
# 3. Input data: Access s3://gcgrid/ directly
# 4. Scratch: Use /fsx/scratch/
#
# Stack: GCC 12.2.0 + OpenMPI 4.1.7 + ESMF 8.6.1 (validated) + GCHP 14.7.1
# Optimization: -O2 -g -mcpu=neoverse-v1 (Graviton 3/4)
