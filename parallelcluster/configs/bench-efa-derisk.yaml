# EFA DE-RISK — 2-node hpc7g (Graviton3E), us-east-1.
# Sole purpose: prove the validated 14.7.1 stack uses EFA across nodes (not TCP fallback)
# before committing to the multi-node matrix. C90, 2 nodes x 60 ranks = 120 total.

Region: us-east-1
Image:
  Os: alinux2023

HeadNode:
  InstanceType: c7g.2xlarge
  Networking:
    SubnetId: subnet-2eec4a71  # us-east-1a (input FSx AZ)
  Ssh:
    KeyName: aws-gchp
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonS3FullAccess

Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: compute
      ComputeResources:
        - Name: nodes
          InstanceType: hpc7g.16xlarge
          MinCount: 0
          MaxCount: 2
          Efa:
            Enabled: true
            GdrSupport: false
      Networking:
        SubnetIds:
          - subnet-2eec4a71
        PlacementGroup:
          Enabled: true   # required for EFA low-latency
      CapacityType: ONDEMAND

SharedStorage:
  - Name: software
    StorageType: FsxLustre
    MountDir: /fsx
    FsxLustreSettings:
      StorageCapacity: 1200
      DeploymentType: SCRATCH_2
      ImportPath: s3://gchp-shared-storage-us-east-1/stacks/aarch64/gchp14.7.1-validated/
      DataCompressionType: LZ4
  - Name: input
    StorageType: FsxLustre
    MountDir: /input
    FsxLustreSettings:
      FileSystemId: fs-0ab32d8b6872eab86  # gchp-input-data-v2

Tags:
  - Key: Project
    Value: GCHP-Benchmark
  - Key: Benchmark
    Value: efa-derisk-2node
