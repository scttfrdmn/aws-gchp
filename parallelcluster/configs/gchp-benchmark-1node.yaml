# GCHP Single-Node Benchmark Cluster
# Purpose: Validate GCHP 14.7.1 validated stack (x86_64)
# Stack: GCC 12.2.0 + OpenMPI 4.1.7 + ESMF 8.6.1 + GCHP 14.7.1
#
# NOTE: ParallelCluster 3.15 limits 1 NEW FSx per cluster
# Workaround: Single FSx imports entire bucket, access via subdirs

Region: us-east-1

Image:
  Os: alinux2023

HeadNode:
  InstanceType: t3.xlarge
  Networking:
    SubnetId: subnet-2eec4a71  # us-east-1a
  Ssh:
    KeyName: aws-gchp
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonS3FullAccess

Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: compute
      ComputeResources:
        - Name: c7a-nodes
          InstanceType: c7a.48xlarge
          MinCount: 0
          MaxCount: 1
      Networking:
        SubnetIds:
          - subnet-2eec4a71
      CapacityType: ONDEMAND

SharedStorage:
  # Single FSx with software stack + scratch
  - Name: fsx
    StorageType: FsxLustre
    MountDir: /fsx
    FsxLustreSettings:
      StorageCapacity: 2400  # Larger to hold both software and scratch
      DeploymentType: SCRATCH_2
      ImportPath: s3://gchp-shared-storage-us-east-1/
      # NO ExportPath - user cluster, software is read-only

Tags:
  - Key: Project
    Value: GCHP-Benchmark
  - Key: Stack
    Value: gchp14.7.1-validated
  - Key: Architecture
    Value: x86_64
  - Key: Test
    Value: single-node-validation

# Usage:
# 1. Software stack: /fsx/stacks/x86_64/gchp14.7.1-validated/
# 2. GCHP binary: /fsx/stacks/x86_64/gchp14.7.1-validated/gchp-14.7.1/bin/gchp
# 3. Input data: Link s3://gcgrid directly or copy small subset to /fsx/input-data/
# 4. Scratch: /fsx/scratch/
# 5. Load environment: source /fsx/stacks/x86_64/gchp14.7.1-validated/gchp-env.sh
