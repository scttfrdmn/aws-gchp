<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GCHP Run Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1419; --card:#1a2129; --line:#2a333d; --fg:#e6edf3; --muted:#8b98a5;
    --run:#3b82f6; --ok:#22c55e; --fail:#ef4444; --idle:#64748b; --pend:#eab308;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
       font-family:'Atkinson Hyperlegible',system-ui,sans-serif;padding:24px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:20px;font-weight:700;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:20px;margin-bottom:16px}
  .row{display:flex;justify-content:space-between;align-items:center;margin:10px 0}
  .label{color:var(--muted);font-size:14px}
  .val{font-size:15px;font-weight:700}
  .badge{display:inline-block;padding:4px 12px;border-radius:999px;font-weight:700;
         font-size:13px;letter-spacing:.04em}
  .b-RUNNING{background:rgba(59,130,246,.18);color:var(--run)}
  .b-SUCCESS{background:rgba(34,197,94,.18);color:var(--ok)}
  .b-FAILED{background:rgba(239,68,68,.18);color:var(--fail)}
  .b-IDLE,.b-NO_DATA,.b-UNKNOWN{background:rgba(100,116,139,.18);color:var(--idle)}
  .b-PENDING,.b-CONFIGURING{background:rgba(234,179,8,.18);color:var(--pend)}
  .bar{height:14px;background:#0b0f14;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
  .fill{height:100%;background:linear-gradient(90deg,var(--run),#60a5fa);width:0;transition:width .4s}
  .fill.done{background:linear-gradient(90deg,var(--ok),#4ade80)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;margin-top:6px}
  .stat .n{font-size:22px;font-weight:700}
  .stat .l{color:var(--muted);font-size:12px}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:8px}
  .stale{color:var(--fail)}
</style>
</head>
<body>
<div class="wrap">
  <h1>GCHP Run Monitor</h1>
  <div class="sub" id="cluster">—</div>

  <div class="card">
    <div class="row">
      <span class="label">Status</span>
      <span id="status" class="badge b-IDLE">…</span>
    </div>
    <div class="row"><span class="label">Simulation progress</span><span class="val" id="pct">—</span></div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="row" style="margin-top:14px">
      <span class="label">Sim date</span><span class="val" id="simdate">—</span>
    </div>
  </div>

  <div class="card">
    <div class="grid">
      <div class="stat"><div class="n" id="tput">—</div><div class="l">throughput (days/day)</div></div>
      <div class="stat"><div class="n" id="eta">—</div><div class="l">est. time remaining</div></div>
      <div class="stat"><div class="n" id="mem">—</div><div class="l">memory used</div></div>
      <div class="stat"><div class="n" id="ckpt">—</div><div class="l">checkpoint written</div></div>
    </div>
  </div>

  <div class="card">
    <div class="row"><span class="label">Job</span><span class="val" id="job">—</span></div>
    <div class="row"><span class="label">Node</span><span class="val" id="node">—</span></div>
    <div class="row"><span class="label">Elapsed (wall)</span><span class="val" id="elapsed">—</span></div>
  </div>

  <div class="foot" id="foot">waiting for data…</div>
</div>

<script>
const $ = id => document.getElementById(id);
const dash = v => (v===undefined||v===null||v==="") ? "—" : v;

async function tick(){
  try{
    const r = await fetch('status.json?_='+Date.now(), {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    render(d);
  }catch(e){
    $('foot').innerHTML = '<span class="stale">no data ('+e.message+')</span>';
  }
}

function render(d){
  const st = d.status || 'UNKNOWN';
  const badge = $('status');
  badge.textContent = st;
  badge.className = 'badge b-' + st;

  const sim = d.sim || {};
  const pct = sim.percent;
  const pctNum = (pct===""||pct===undefined) ? null : Number(pct);
  $('pct').textContent = pctNum===null ? '—' : pctNum + '%';
  const fill = $('fill');
  fill.style.width = (pctNum===null?0:pctNum) + '%';
  fill.classList.toggle('done', st==='SUCCESS');

  const sd = dash(sim.current_date), stime = dash(sim.current_time);
  $('simdate').textContent = (sd==='—') ? '—' : sd + (stime!=='—' ? '  '+stime : '');

  $('tput').textContent = dash(sim.throughput_days_day);
  $('eta').textContent  = dash(sim.eta);
  $('mem').textContent  = (d.mem_used_pct===""||d.mem_used_pct===undefined) ? '—' : d.mem_used_pct + '%';
  $('ckpt').textContent = d.checkpoint===true ? 'yes' : (d.checkpoint===false ? 'no' : '—');

  const job = d.job || {};
  $('job').textContent = dash(job.id) + (job.state ? '  ('+job.state+')' : '');
  $('node').textContent = dash(job.node);
  $('elapsed').textContent = dash(job.elapsed);

  $('cluster').textContent = dash(d.cluster);
  $('foot').textContent = 'updated ' + dash(d.updated) + '  •  refreshes every 10s';
}

tick();
setInterval(tick, 10000);
</script>
</body>
</html>
